  <path d="M128 232 Q140 226 150 232 Q160 226 172 232" stroke="#9b59b6" stroke-width="2" fill="none"/>
  <!-- Antennas -->
  <path d="M130,95 C120,70 108,50 115,35" stroke="#9b59b6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="115" cy="33" r="6" fill="#f1c40f"/>
