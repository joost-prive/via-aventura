  <ellipse cx="193" cy="153" rx="23" ry="19" fill="white"/>
  <!-- Pupils -->
  <circle cx="109" cy="155" r="14" fill="#4a3220"/>
  <circle cx="109" cy="155" r="9" fill="#6b4a2e"/>
  <circle cx="191" cy="155" r="14" fill="#4a3220"/>
  <circle cx="191" cy="155" r="9" fill="#6b4a2e"/>
  <!-- Eye shine -->
  <circle cx="116" cy="148" r="5" fill="white"/>
  <circle cx="198" cy="148" r="5" fill="white"/>
  <!-- Eyelashes -->
  <path d="M86 141 Q107 131 128 141" stroke="#3d2510" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M172 141 Q193 131 214 141" stroke="#3d2510" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Purple eyeshadow -->
  <path d="M86 141 Q107 133 128 141" fill="#9b59b6" opacity="0.5"/>
  <path d="M172 141 Q193 133 214 141" fill="#9b59b6" opacity="0.5"/>
  <!-- Nose -->
  <ellipse cx="150" cy="197" rx="14" ry="10" fill="#ffc099"/>
  <ellipse cx="143" cy="201" rx="5" ry="4" fill="#e8a07a"/>
  <ellipse cx="157" cy="201" rx="5" ry="4" fill="#e8a07a"/>
