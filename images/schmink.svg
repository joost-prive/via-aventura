<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 360">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#e8d0ff"/>
      <stop offset="100%" stop-color="#c8a8f0"/>
    </radialGradient>
  </defs>
  <rect width="300" height="360" fill="url(#bg2)" rx="20"/>
  <!-- Neck -->
