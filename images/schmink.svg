  <circle cx="222" cy="158" r="7" fill="white" opacity="0.4"/>
  <circle cx="95" cy="225" r="7" fill="#e67e22" opacity="0.6"/>
  <circle cx="205" cy="225" r="7" fill="#e67e22" opacity="0.6"/>
  <!-- Wing outline dots -->
  <circle cx="107" cy="153" r="23" fill="white" opacity="0.15"/>
  <circle cx="193" cy="153" r="23" fill="white" opacity="0.15"/>
  <!-- Eyebrows -->
  <path d="M86 118 Q107 108 128 118" stroke="#8b5e3c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M172 118 Q193 108 214 118" stroke="#8b5e3c" stroke-width="4" fill="none" stroke-linecap="round"/>
